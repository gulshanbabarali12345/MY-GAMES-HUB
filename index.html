<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 All-In-One Mega Arcade | Play Instant Games 🎮</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0d0d13; color: white; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #ff0055; margin-bottom: 5px; }
        .ad-container { background: #161622; padding: 15px; margin: 15px auto; max-width: 728px; min-height: 90px; border: 2px dashed #333; border-radius: 8px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .game-card { background: #1a1a26; padding: 15px; border-radius: 12px; border: 1px solid #2a2a3a; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: #ff0055; box-shadow: 0 5px 15px rgba(255, 0, 85, 0.3); }
        .game-card h3 { margin: 10px 0 5px 0; color: #fff; }
        .game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .game-window { width: 90%; max-width: 600px; height: 450px; background: #000; border: 4px solid #ff0055; border-radius: 12px; overflow: hidden; }
        .close-btn { background: #ff0055; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>⚡ MEGA ARCADE HUB ⚡</h1>
    <p>Click any game to play instantly without leaving this website!</p>

    <!-- 💰 ADSTERRA TOP AD PLACEHOLDER -->
    <div class="ad-container">
        <p style="color: #444; font-size: 11px; margin: 0;">ADVERTISEMENT</p>
        <!-- APNA ADSTERRA BANNER CODE YAHAN PASTE KAREIN -->
    </div>

    <!-- MAIN GRID FOR 28 GAMES -->
    <div class="games-grid">
        <div class="game-card" onclick="startSnake()"><h3>🐍 Classic Snake</h3><p>Play Now</p></div>
        <div class="game-card" onclick="startClicker()"><h3>💰 Gold Clicker</h3><p>Play Now</p></div>
        
        <!-- Baki ki 26 games ke cards bhi isi tarah bagair kisi link ke chalenge -->
        <div class="game-card" onclick="alert('More games coming inside this single page!')"><h3>🎮 Game Slot 3</h3><p>Click to Play</p></div>
        <div class="game-card" onclick="alert('More games coming inside this single page!')"><h3>🎮 Game Slot 4</h3><p>Click to Play</p></div>
    </div>

    <!-- 💰 ADSTERRA BOTTOM AD PLACEHOLDER -->
    <div class="ad-container">
        <!-- APNA DOSRA ADSTERRA BANNER CODE YAHAN PASTE KAREIN -->
    </div>

    <!-- GAME OVERLAY POPUP -->
    <div class="game-overlay" id="gamePlayer">
        <div class="game-window" id="canvas-container"></div>
        <button class="close-btn" onclick="closeGame()">❌ Close Game</button>
    </div>

    <script>
        const playerOverlay = document.getElementById('gamePlayer');
        const container = document.getElementById('canvas-container');
        let gameInterval;

        function closeGame() {
            playerOverlay.style.display = 'none';
            container.innerHTML = '';
            clearInterval(gameInterval);
        }

        // ==================== GAME 1: SNAKE CODE ====================
        function startSnake() {
            playerOverlay.style.display = 'flex';
            container.innerHTML = '<canvas id="snakeCanvas" width="400" height="400" style="background:#000; display:block; margin:20px auto; border:2px solid #ff0055;"></canvas>';
            
            const canvas = document.getElementById("snakeCanvas");
            const ctx = canvas.getContext("2d");
            const grid = 20; let snake = [{x: 160, y: 160}]; let dx = grid, dy = 0; let food = {x: 80, y: 80};

            document.onkeydown = function(e) {
                if (e.keyCode === 37 && dx === 0) { dx = -grid; dy = 0; }
                else if (e.keyCode === 38 && dy === 0) { dx = 0; dy = -grid; }
                else if (e.keyCode === 39 && dx === 0) { dx = grid; dy = 0; }
                else if (e.keyCode === 40 && dy === 0) { dx = 0; dy = grid; }
            };

            gameInterval = setInterval(function() {
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) { alert("Game Over"); closeGame(); return; }
                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    food.x = Math.floor(Math.random() * (canvas.width/grid)) * grid;
                    food.y = Math.floor(Math.random() * (canvas.height/grid)) * grid;
                } else { snake.pop(); }
                
                ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ff0055"; ctx.fillRect(food.x, food.y, grid, grid);
                ctx.fillStyle = "#00ffaa"; snake.forEach(part => ctx.fillRect(part.x, part.y, grid, grid));
            }, 150);
        }

        // ==================== GAME 2: GOLD CLICKER CODE ====================
        function startClicker() {
            playerOverlay.style.display = 'flex';
            container.innerHTML = `
                <div style="padding:50px; text-align:center; color:white;">
                    <h2>💰 Gold Clicker 💰</h2>
                    <h3 id="goldScore" style="color:#00ffaa;">Gold: 0</h3>
                    <button onclick="document.getElementById('goldScore').innerText = 'Gold: ' + (++goldCount)" style="background:#ff0055; color:white; border:none; padding:15px 30px; font-size:18px; border-radius:8px; cursor:pointer;">Click Me!</button>
                </div>`;
            window.goldCount = 0;
        }
    </script>
</body>
</html>
